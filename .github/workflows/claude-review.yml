name: claude-review

on:
  pull_request:
    types: [opened, reopened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

env:
  OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
  MODEL: openrouter/free

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine event context
        id: context
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if this is a comment event on a PR
          if [ "${{ github.event_name }}" == "issue_comment" ]; then
            PR_NUM="${{ github.event.issue.number }}"
            COMMENT_BODY='${{ github.event.comment.body }}'
            if echo "$COMMENT_BODY" | grep -qi '@claude'; then
              echo "pr_num=$PR_NUM" >> "$GITHUB_OUTPUT"
              echo "trigger=comment" >> "$GITHUB_OUTPUT"
            else
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "reason=no_mention" >> "$GITHUB_OUTPUT"
            fi
          elif [ "${{ github.event_name }}" == "pull_request_review_comment" ]; then
            PR_NUM="${{ github.event.pull_request.number }}"
            COMMENT_BODY='${{ github.event.comment.body }}'
            if echo "$COMMENT_BODY" | grep -qi '@claude'; then
              echo "pr_num=$PR_NUM" >> "$GITHUB_OUTPUT"
              echo "trigger=comment" >> "$GITHUB_OUTPUT"
            else
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "reason=no_mention" >> "$GITHUB_OUTPUT"
            fi
          else
            PR_TITLE=$(gh pr view "${{ github.event.pull_request.number }}" --json title --jq '.title')
            echo "pr_num=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            echo "trigger=pr_event" >> "$GITHUB_OUTPUT"
            echo "title=${PR_TITLE}" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if not triggered
        if: steps.context.outputs.skip == 'true'
        run: |
          echo "Skipping: ${{ steps.context.outputs.reason }}"

      - name: React to comment with eyes
        if: steps.context.outputs.trigger == 'comment'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMENT_ID='${{ github.event.comment.id }}'
          gh api repos/${{ github.repository }}/issues/${{ steps.context.outputs.pr_num }}/comments/$COMMENT_ID/reactions \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -d '{"content": "eyes"}'

      - name: Get PR details
        id: pr
        if: steps.context.outputs.trigger == 'pr_event'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_TITLE=$(gh pr view ${{ github.event.pull_request.number }} --json title --jq '.title')
          echo "title=${PR_TITLE}" >> "$GITHUB_OUTPUT"

      - name: Run Claude review
        id: review
        if: steps.context.outputs.trigger == 'comment'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x .github/workflows/review-script.sh
          .github/workflows/review-script.sh \
            "${{ steps.context.outputs.pr_num }}" \
            "Comment trigger" \
            "${{ env.OPENROUTER_API_KEY }}" \
            "comment" \
            "${{ env.MODEL }}"

      - name: Run Claude review on PR open/update
        id: review_pr
        if: steps.context.outputs.trigger == 'pr_event'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x .github/workflows/review-script.sh
          .github/workflows/review-script.sh \
            "${{ steps.context.outputs.pr_num }}" \
            "${{ steps.pr.outputs.title }}" \
            "${{ env.OPENROUTER_API_KEY }}" \
            "pr_event" \
            "${{ env.MODEL }}"

      - name: Log review result
        if: always()
        run: echo "Claude review completed for PR ${{ steps.context.outputs.pr_num }}"